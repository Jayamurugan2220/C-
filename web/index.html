<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battle Game - Online Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            border: 2px solid rgba(0, 255, 255, 0.2);
        }

        h1 {
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
            to { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 255, 255, 0.6); }
        }

        #gameCanvas {
            border: 3px solid #00ffff;
            border-radius: 10px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            display: block;
            margin: 20px auto;
        }

        .controls {
            background: rgba(0, 50, 100, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .controls h3 {
            color: #00ffff;
            margin-bottom: 10px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            padding: 5px 10px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 5px;
        }

        .key {
            background: #00ffff;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 255, 255, 0.3);
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .info-box {
            background: rgba(0, 50, 100, 0.3);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .info-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }

        .info-box h4 {
            color: #00ffff;
            margin-bottom: 5px;
        }

        .info-box .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
        }

        .play-button {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }

        .play-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.5);
        }

        .play-button:active {
            transform: translateY(-1px);
        }

        .hidden {
            display: none;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .mobile-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mobile-btn:active {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
            
            .controls {
                display: none;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            #gameCanvas {
                width: 100%;
                max-width: 400px;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🚀 Space Battle Game 🎮</h1>
        
        <div id="menuScreen">
            <div class="game-info">
                <div class="info-box">
                    <h4>🎯 Target Score</h4>
                    <div class="value" id="targetScore">300</div>
                </div>
                <div class="info-box">
                    <h4>❤️ Health</h4>
                    <div class="value" id="healthDisplay">100</div>
                </div>
                <div class="info-box">
                    <h4>🏆 Level</h4>
                    <div class="value" id="levelDisplay">1</div>
                </div>
                <div class="info-box">
                    <h4>⭐ Score</h4>
                    <div class="value" id="scoreDisplay">0</div>
                </div>
            </div>
            
            <button class="play-button" onclick="startGame()">🚀 START GAME</button>
            
            <div class="controls">
                <h3>🎮 Game Controls</h3>
                <div class="control-item">
                    <span>Move Left</span>
                    <span class="key">←</span>
                </div>
                <div class="control-item">
                    <span>Move Right</span>
                    <span class="key">→</span>
                </div>
                <div class="control-item">
                    <span>Shoot</span>
                    <span class="key">SPACE</span>
                </div>
                <div class="control-item">
                    <span>Alt Shoot</span>
                    <span class="key">CTRL</span>
                </div>
            </div>
        </div>
        
        <div id="gameScreen" class="hidden">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <div class="mobile-controls">
                <div></div>
                <button class="mobile-btn" ontouchstart="mobileMove('up')" ontouchend="stopMobileMove()">↑</button>
                <div></div>
                <button class="mobile-btn" ontouchstart="mobileMove('left')" ontouchend="stopMobileMove()">←</button>
                <button class="mobile-btn" ontouchstart="mobileShoot()" ontouchend="stopMobileShoot()">🔥</button>
                <button class="mobile-btn" ontouchstart="mobileMove('right')" ontouchend="stopMobileMove()">→</button>
                <div></div>
                <button class="mobile-btn" ontouchstart="mobileMove('down')" ontouchend="stopMobileMove()">↓</button>
                <div></div>
            </div>
            
            <div class="game-info">
                <div class="info-box">
                    <h4>❤️ Health</h4>
                    <div class="value" id="gameHealth">100</div>
                </div>
                <div class="info-box">
                    <h4>⭐ Score</h4>
                    <div class="value" id="gameScore">0</div>
                </div>
                <div class="info-box">
                    <h4>🏆 Level</h4>
                    <div class="value" id="gameLevel">1</div>
                </div>
                <div class="info-box">
                    <h4>🎯 Target</h4>
                    <div class="value" id="gameTarget">300</div>
                </div>
            </div>
            
            <button class="play-button" onclick="backToMenu()">🏠 MENU</button>
        </div>
    </div>

    <script src="spacebattle.js"></script>
</body>
</html>
